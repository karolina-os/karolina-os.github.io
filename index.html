<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karolina ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,300;1,9..144,700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --lav:    #C0B4DC;
  --lav2:   #D8D0EE;
  --lav3:   #EEEAF8;
  --lav4:   #F6F3FC;
  --sage:   #B4C4AC;
  --sage2:  #D0DCC8;
  --sage3:  #EAF0E6;
  --pink:   #E4BED0;
  --pink2:  #F2DDE8;
  --blue:   #A8BAD0;
  --blue2:  #C8D6E4;
  --linen:  #F4F0E8;
  --ink:    #201C2C;
  --mid:    #68607C;
  --soft:   #9C94B0;
  --div:    #DCD4EC;
  --bg:     #F8F5FC;
  --acc:    #5A4878; /* deep lavender — the punch */
  --acc-g:  #486040; /* deep sage */
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:'DM Mono',monospace;
  font-weight:300;
  font-size:13px;
  line-height:1.75;
  cursor:none;
  overflow-x:hidden;
}

/* ── CURSOR ─────────────────────────── */
#cur{
  position:fixed;pointer-events:none;z-index:9999;
  width:9px;height:9px;border-radius:50%;
  background:var(--lav);
  transform:translate(-50%,-50%);
  transition:width .18s,height .18s,background .18s;
  mix-blend-mode:multiply;
}
#cur.big{width:38px;height:38px;background:var(--lav2);}
#cur-ring{
  position:fixed;pointer-events:none;z-index:9998;
  width:30px;height:30px;
  border:1px solid var(--lav);
  border-radius:50%;
  transform:translate(-50%,-50%);
  opacity:.4;
}

/* ── TOP STRIP ───────────────────────── */
.top-strip{
  background:var(--acc);
  padding:8px 0;overflow:hidden;
}
.strip-inner{
  display:flex;white-space:nowrap;
  animation:stripScroll 28s linear infinite;
}
@keyframes stripScroll{to{transform:translateX(-50%)}}
.strip-bit{
  display:inline-flex;align-items:center;gap:14px;
  padding:0 22px;
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--lav2);
}
.strip-sep{color:var(--lav);opacity:.5;}

/* ── NAV ─────────────────────────────── */
nav{
  position:sticky;top:0;z-index:200;
  background:rgba(248,245,252,.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--div);
  padding:0 56px;height:48px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{
  font-family:'Fraunces',serif;
  font-size:1.05rem;font-weight:700;font-style:italic;
  color:var(--acc);
}
.nav-right{display:flex;align-items:center;gap:28px;}
.nav-links{display:flex;gap:24px;}
.nav-links a{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--soft);text-decoration:none;cursor:none;
  transition:color .2s;
}
.nav-links a:hover{color:var(--acc);}

/* language switcher */
.lang-switch{
  display:flex;
  border:1px solid var(--div);
  overflow:hidden;
}
.lang-btn{
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 10px;
  background:transparent;border:none;
  color:var(--soft);cursor:none;
  transition:background .2s,color .2s;
  font-family:'DM Mono',monospace;
}
.lang-btn.active{
  background:var(--acc);color:#fff;
}

/* ── HERO ────────────────────────────── */
.hero{
  min-height:92vh;
  display:grid;
  grid-template-columns:1fr 360px;
  align-items:center;
  padding:64px 56px 48px;
  gap:48px;
  position:relative;overflow:hidden;
}

.hero::before{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 26px,rgba(192,180,220,.05) 26px,rgba(192,180,220,.05) 27px),
    repeating-linear-gradient(90deg,transparent,transparent 26px,rgba(192,180,220,.05) 26px,rgba(192,180,220,.05) 27px);
  pointer-events:none;
}

.hero-blob{
  position:absolute;
  width:520px;height:520px;border-radius:50%;
  background:radial-gradient(circle,var(--lav3) 0%,var(--sage3) 50%,transparent 75%);
  right:-120px;top:50%;transform:translateY(-50%);
  pointer-events:none;z-index:0;
  animation:breathe 8s ease-in-out infinite alternate;
}
@keyframes breathe{from{transform:translateY(-50%) scale(1);}to{transform:translateY(-50%) scale(1.06);}}

/* deco rings */
.deco-ring{
  position:absolute;border:1px solid var(--lav2);
  border-radius:50%;pointer-events:none;z-index:0;
  animation:spinSlow 25s linear infinite;opacity:.3;
}
@keyframes spinSlow{to{transform:rotate(360deg)}}

.hero-left{position:relative;z-index:1;}
.hero-right{position:relative;z-index:1;}

.hero-kicker{
  display:inline-flex;align-items:center;gap:10px;
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--acc);margin-bottom:22px;
  background:var(--lav3);border:1px solid var(--lav2);
  padding:5px 14px;
}
.kicker-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--lav);
  animation:kpulse 2s ease-in-out infinite;
}
@keyframes kpulse{0%,100%{opacity:1}50%{opacity:.2}}

h1.hero-h{
  font-family:'Fraunces',serif;
  font-size:clamp(3rem,6vw,5rem);
  font-weight:700;line-height:.95;
  letter-spacing:-.03em;color:var(--ink);
  margin-bottom:26px;
}
h1.hero-h em{font-style:italic;font-weight:300;color:var(--acc);}
h1.hero-h .ghost{-webkit-text-stroke:1.5px var(--lav);color:transparent;}

.hero-desc{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:1.1rem;line-height:1.85;
  color:var(--mid);max-width:420px;margin-bottom:36px;
}
.hero-desc strong{font-style:normal;font-weight:700;color:var(--ink);}

.hero-btns{display:flex;gap:12px;flex-wrap:wrap;}

.btn-primary{
  display:inline-flex;align-items:center;gap:9px;
  background:var(--acc);color:var(--lav3);
  padding:13px 28px;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  text-decoration:none;cursor:none;border:1px solid var(--acc);
  transition:background .25s;position:relative;overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;inset:0;
  background:var(--lav);transform:translateX(-105%);
  transition:transform .3s ease;z-index:0;
}
.btn-primary:hover::after{transform:translateX(0);}
.btn-primary span,.btn-primary svg{position:relative;z-index:1;}

.btn-ghost{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--soft);padding:13px 22px;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  text-decoration:none;cursor:none;
  border:1px solid var(--div);transition:border-color .25s,color .25s;
}
.btn-ghost:hover{border-color:var(--lav);color:var(--acc);}

/* ── HERO CARD ───────────────────────── */
.hero-card{
  background:var(--lav4);border:1px solid var(--div);
  position:relative;
}
.hero-card::before{
  content:'';position:absolute;
  top:-5px;left:-5px;right:5px;bottom:5px;
  border:1px solid var(--lav2);z-index:-1;
}
.card-top{
  background:var(--lav3);border-bottom:1px solid var(--div);
  padding:11px 20px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--acc);display:flex;align-items:center;justify-content:space-between;
}
.card-dot{width:6px;height:6px;border-radius:50%;background:var(--lav);animation:kpulse 2s ease-in-out infinite;}
.card-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:11px 20px;border-bottom:1px solid var(--div);font-size:12px;gap:12px;
}
.card-row:last-child{border-bottom:none;}
.card-k{color:var(--soft);}
.card-v{color:var(--ink);text-align:right;font-family:'Fraunces',serif;font-style:italic;font-size:.95rem;}
.card-v.hi{color:var(--acc);}

/* ── COLOUR BAND ─────────────────────── */
.band{
  overflow:hidden;padding:11px 0;
  background:linear-gradient(90deg,var(--lav) 0%,var(--lav2) 40%,var(--sage2) 70%,var(--pink2) 100%);
}
.band-inner{
  display:flex;white-space:nowrap;
  animation:stripScroll 20s linear infinite;
}
.band-word{
  display:inline-flex;align-items:center;gap:18px;padding:0 22px;
  font-family:'Fraunces',serif;font-size:clamp(.85rem,1.5vw,1.05rem);
  font-weight:700;font-style:italic;color:rgba(255,255,255,.9);
}
.band-sep{font-style:normal;opacity:.5;}

/* ── SECTIONS ────────────────────────── */
.section{padding:72px 56px;max-width:1000px;margin:0 auto;}
hr.rule{border:none;border-top:1px solid var(--div);margin:0 56px;}

.sec-tag{
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--acc);margin-bottom:10px;
  display:flex;align-items:center;gap:10px;
}
.sec-tag::before{content:'';display:inline-block;width:16px;height:1px;background:var(--lav);}

.sec-title{
  font-family:'Fraunces',serif;font-size:clamp(1.8rem,3.5vw,2.6rem);
  font-weight:700;line-height:1.05;color:var(--ink);
  margin-bottom:40px;letter-spacing:-.02em;
}
.sec-title em{font-style:italic;font-weight:300;color:var(--acc);}

/* ── ABOUT ───────────────────────────── */
.about-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:0;border:1px solid var(--div);
}
.about-left{
  padding:44px 40px;border-right:1px solid var(--div);background:#fff;
}
.about-right{
  padding:44px 40px;background:var(--lav4);position:relative;overflow:hidden;
}
.about-right::after{
  content:'✦';position:absolute;bottom:-30px;right:-10px;
  font-size:10rem;color:rgba(192,180,220,.1);pointer-events:none;
  font-family:'Fraunces',serif;
}
.about-body{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:1rem;line-height:1.9;color:var(--ink);
}
.about-body p+p{margin-top:.85em;}
.about-body strong{font-style:normal;font-weight:700;color:var(--acc);}

.fact-list{list-style:none;position:relative;z-index:1;}
.fact-item{
  padding:11px 0;border-bottom:1px solid var(--div);
  display:grid;grid-template-columns:22px 1fr;gap:10px;
}
.fact-item:last-child{border-bottom:none;}
.fact-ico{font-size:.9rem;margin-top:1px;}
.fact-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--lav);margin-bottom:1px;display:block;}
.fact-val{font-size:12px;color:var(--ink);line-height:1.4;}

/* ── DO CARDS ────────────────────────── */
.do-cards{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--div);border:1px solid var(--div);
}
.do-card{
  background:#fff;padding:26px 22px;
  position:relative;transition:background .25s;overflow:hidden;
}
.do-card:hover{background:var(--lav4);}
.do-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--lav),var(--sage));
  opacity:0;transition:opacity .25s;
}
.do-card:hover::after{opacity:1;}
.do-chip{
  font-size:8px;letter-spacing:2px;text-transform:uppercase;
  color:var(--acc);background:var(--lav3);border:1px solid var(--lav2);
  padding:2px 9px;display:inline-block;margin-bottom:14px;
}
.do-title{
  font-family:'Fraunces',serif;font-weight:700;
  font-size:1.05rem;color:var(--ink);margin-bottom:8px;line-height:1.25;
}
.do-body{font-size:12px;color:var(--mid);line-height:1.75;}

/* ── LEARNING ────────────────────────── */
.learn-section{
  background:var(--acc);padding:72px 56px;
  position:relative;overflow:hidden;
}
.learn-bg{
  position:absolute;bottom:-20px;left:-10px;
  font-family:'Fraunces',serif;font-size:16rem;font-weight:700;font-style:italic;
  color:rgba(255,255,255,.03);pointer-events:none;white-space:nowrap;user-select:none;
}
.learn-section .sec-tag{color:var(--lav2);}
.learn-section .sec-tag::before{background:var(--lav);}
.learn-section .sec-title{color:var(--lav4);}
.learn-section .sec-title em{color:var(--lav2);}

.learn-list{max-width:680px;margin-top:40px;}
.learn-row{
  display:grid;grid-template-columns:32px 1fr auto;
  gap:20px;align-items:start;padding:18px 0;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.learn-row:first-child{border-top:1px solid rgba(255,255,255,.07);}
.learn-n{font-family:'Fraunces',serif;font-weight:700;font-size:11px;color:var(--lav2);letter-spacing:1px;padding-top:3px;}
.learn-name{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:1rem;color:var(--lav4);margin-bottom:3px;}
.learn-detail{font-size:11px;color:rgba(216,208,238,.4);margin-bottom:8px;}
.prog-track{height:2px;background:rgba(255,255,255,.1);overflow:hidden;}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--lav2),var(--sage2));transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.badge{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border:1px solid;white-space:nowrap;margin-top:2px;}
.b-on{border-color:var(--lav2);color:var(--lav2);}
.b-next{border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.3);}
.b-done{border-color:var(--sage2);color:var(--sage2);}

/* ── NOW ─────────────────────────────── */
.now-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:var(--div);border:1px solid var(--div);
}
.now-cell{background:#fff;padding:26px 28px;transition:background .2s;}
.now-cell:hover{background:var(--lav4);}
.now-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--acc);margin-bottom:7px;}
.now-val{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:1rem;color:var(--ink);line-height:1.55;}

/* ── SNAKE GAME ──────────────────────── */
.game-section{
  background:var(--lav4);
  padding:72px 56px;
  border-top:1px solid var(--div);
  border-bottom:1px solid var(--div);
}
.game-section .inner{max-width:1000px;margin:0 auto;}

.game-wrap{
  display:grid;grid-template-columns:1fr auto;
  gap:40px;align-items:start;
  margin-top:40px;
}
.game-info{max-width:300px;}
.game-desc{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:.95rem;line-height:1.8;color:var(--mid);margin-bottom:20px;
}
.game-controls{
  font-size:11px;color:var(--soft);line-height:1.9;
}
.game-controls span{color:var(--acc);}

.score-display{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--acc);margin-bottom:8px;
}
.score-num{
  font-family:'Fraunces',serif;font-weight:700;
  font-size:2rem;color:var(--acc);line-height:1;
  margin-bottom:16px;
}

.game-btn{
  display:inline-block;
  background:var(--acc);color:var(--lav3);
  padding:10px 22px;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  border:none;cursor:pointer;font-family:'DM Mono',monospace;font-weight:300;
  transition:background .2s;margin-bottom:6px;width:100%;text-align:center;
}
.game-btn:hover{background:var(--mid);}

.game-status{
  font-size:10px;color:var(--soft);letter-spacing:1px;
  text-transform:uppercase;margin-top:8px;min-height:16px;
}

/* canvas */
#snakeCanvas{
  border:1.5px solid var(--div);
  background:var(--lav4);
  display:block;
  image-rendering:pixelated;
}

/* mobile d-pad */
.dpad{
  display:none;
  grid-template-areas:". up ." "left . right" ". down .";
  grid-template-columns:40px 40px 40px;
  grid-template-rows:40px 40px 40px;
  gap:4px;margin-top:16px;
}
.dpad-btn{
  background:var(--lav3);border:1px solid var(--lav2);
  color:var(--acc);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:4px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}

/* ── CTA ─────────────────────────────── */
.cta-section{
  background:var(--lav2);padding:72px 56px;text-align:center;
  position:relative;overflow:hidden;border-top:1px solid var(--div);
}
.cta-section::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.5) 1px,transparent 1px);
  background-size:20px 20px;opacity:.35;pointer-events:none;
}
.cta-h{
  font-family:'Fraunces',serif;font-size:clamp(2rem,4vw,3rem);
  font-weight:700;font-style:italic;color:var(--ink);
  margin-bottom:10px;letter-spacing:-.02em;position:relative;
}
.cta-sub{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:1rem;color:var(--mid);margin-bottom:32px;position:relative;
}
.cta-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--acc);color:var(--lav3);
  padding:14px 34px;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  text-decoration:none;cursor:none;transition:background .25s;position:relative;
}
.cta-btn:hover{background:var(--acc-g);}

/* ── FOOTER ──────────────────────────── */
footer{
  background:var(--ink);padding:28px 56px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(192,180,220,.3);
}
footer a{color:var(--lav2);text-decoration:none;}
footer a:hover{color:var(--lav);}

/* ── REVEAL ──────────────────────────── */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .65s ease,transform .65s ease;}
.reveal.on{opacity:1;transform:none;}
.stagger>*{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease;}
.stagger.on>*:nth-child(1){opacity:1;transform:none;transition-delay:.05s;}
.stagger.on>*:nth-child(2){opacity:1;transform:none;transition-delay:.14s;}
.stagger.on>*:nth-child(3){opacity:1;transform:none;transition-delay:.23s;}

@media(max-width:760px){
  nav{padding:0 20px;}.nav-links{display:none;}
  .hero{grid-template-columns:1fr;padding:48px 20px;min-height:auto;}
  .hero-right{display:none;}
  .section{padding:48px 20px;}
  hr.rule{margin:0 20px;}
  .about-grid,.now-grid{grid-template-columns:1fr;}
  .about-left,.about-right{padding:32px 20px;}
  .do-cards{grid-template-columns:1fr;}
  .learn-section,.game-section,.cta-section{padding:48px 20px;}
  .game-wrap{grid-template-columns:1fr;}
  .game-info{max-width:100%;}
  .dpad{display:grid;}
  footer{flex-direction:column;gap:10px;padding:20px;text-align:center;}
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<script>
// ── CURSOR
const cur=document.getElementById('cur');
const ring=document.getElementById('cur-ring');
let mx=-100,my=-100,rx=-100,ry=-100;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.left=mx+'px';cur.style.top=my+'px';
});
(function loop(){
  rx+=(mx-rx)*.12;ry+=(my-ry)*.12;
  ring.style.left=rx+'px';ring.style.top=ry+'px';
  requestAnimationFrame(loop);
})();
document.querySelectorAll('a,button,.do-card,.now-cell,.learn-row').forEach(el=>{
  el.addEventListener('mouseenter',()=>cur.classList.add('big'));
  el.addEventListener('mouseleave',()=>cur.classList.remove('big'));
});

// ── SCROLL REVEAL
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(!e.isIntersecting)return;
    e.target.classList.add('on');
    e.target.querySelectorAll('.prog-fill').forEach(b=>{
      setTimeout(()=>{b.style.width=b.dataset.w+'%';},120);
    });
    io.unobserve(e.target);
  });
},{threshold:.07});
document.querySelectorAll('.reveal,.stagger').forEach(el=>io.observe(el));

// ── HERO PARALLAX
const heroH=document.querySelector('.hero-h');
window.addEventListener('scroll',()=>{
  if(!heroH)return;
  heroH.style.transform=`translateY(${window.scrollY*.1}px)`;
},{passive:true});

// ── SNAKE GAME
const canvas=document.getElementById('snakeCanvas');
const ctx=canvas.getContext('2d');
const CELL=14, COLS=20, ROWS=20;
canvas.width=CELL*COLS; canvas.height=CELL*ROWS;

const COLORS={
  bg:'#F6F3FC',
  grid:'rgba(192,180,220,.12)',
  head:'#7060A0',
  body:['#C0B4DC','#D8D0EE','#B4C4AC','#E4BED0'],
  food:'#5A4878',
  text:'#5A4878'
};

let snake,dir,nextDir,food,score,gameRunning=false,gameOver=false,gameLoop;

function initGame(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; gameOver=false;
  placeFood();
  document.getElementById('scoreDisplay').textContent='0';
  document.querySelector('.game-status').textContent='';
}

function placeFood(){
  let pos;
  do{pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food=pos;
}

function drawGame(){
  // bg
  ctx.fillStyle=COLORS.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // grid
  ctx.strokeStyle=COLORS.grid;
  ctx.lineWidth=.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}

  // food — draw ✦
  ctx.fillStyle=COLORS.food;
  ctx.font=`bold ${CELL+2}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('✦',food.x*CELL+CELL/2,food.y*CELL+CELL/2+1);

  // snake
  snake.forEach((seg,i)=>{
    if(i===0){
      ctx.fillStyle=COLORS.head;
    } else {
      ctx.fillStyle=COLORS.body[i%COLORS.body.length];
    }
    const pad=i===0?1:2;
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+pad,seg.y*CELL+pad,CELL-pad*2,CELL-pad*2,3);
    ctx.fill();
  });
}

function step(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  // wall collision
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){endGame();return;}
  // self collision
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){endGame();return;}

  snake.unshift(head);

  if(head.x===food.x&&head.y===food.y){
    score++;
    document.getElementById('scoreDisplay').textContent=score;
    placeFood();
  } else {
    snake.pop();
  }
  drawGame();
}

function startGame(){
  if(gameLoop)clearInterval(gameLoop);
  initGame();
  gameRunning=true;
  drawGame();
  gameLoop=setInterval(step,130);
  document.getElementById('startBtn').textContent=t('btn_restart');
  document.querySelector('.game-status').textContent='';
}

function endGame(){
  clearInterval(gameLoop);
  gameRunning=false; gameOver=true;

  // game over overlay
  ctx.fillStyle='rgba(90,72,120,.7)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#F6F3FC';
  ctx.font=`bold 16px 'DM Mono',monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(t('game_over'),canvas.width/2,canvas.height/2-12);
  ctx.font=`12px 'DM Mono',monospace`;
  ctx.fillText(`${t('score_label')}: ${score}`,canvas.width/2,canvas.height/2+14);

  document.querySelector('.game-status').textContent=t('game_over');
  document.getElementById('startBtn').textContent=t('btn_restart');
}

// draw idle screen
function drawIdle(){
  ctx.fillStyle=COLORS.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle=COLORS.grid;ctx.lineWidth=.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}
  ctx.fillStyle=COLORS.text;
  ctx.font=`bold 14px 'DM Mono',monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('✦',canvas.width/2,canvas.height/2);
}

// controls
document.addEventListener('keydown',e=>{
  if(!gameRunning)return;
  const map={'ArrowUp':{x:0,y:-1},'ArrowDown':{x:0,y:1},'ArrowLeft':{x:-1,y:0},'ArrowRight':{x:1,y:0},
    'w':{x:0,y:-1},'s':{x:0,y:1},'a':{x:-1,y:0},'d':{x:1,y:0},
    'W':{x:0,y:-1},'S':{x:0,y:1},'A':{x:-1,y:0},'D':{x:1,y:0}};
  const nd=map[e.key];
  if(nd&&!(nd.x===-dir.x&&nd.y===-dir.y)){nextDir=nd;}
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});

function dpadDir(d){
  if(!gameRunning)return;
  const map={UP:{x:0,y:-1},DOWN:{x:0,y:1},LEFT:{x:-1,y:0},RIGHT:{x:1,y:0}};
  const nd=map[d];
  if(nd&&!(nd.x===-dir.x&&nd.y===-dir.y))nextDir=nd;
}

// ── INIT
renderAll();
drawIdle();
document.querySelector('.game-status').textContent=T.en.game_ready;
</script>
</body>
