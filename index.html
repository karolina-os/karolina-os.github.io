<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karolina ✦ welcome!</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:    #FDF8F8;
  --lav:   #D4A8B8;
  --lav2:  #EDD4DC;
  --lav3:  #FAF0F2;
  --acc:   #8B2040;
  --pink:  #C96080;
  --pink2: #E8B0C0;
  --pink3: #FDF0F4;
  --sage:  #C8A0A8;
  --sage2: #EDD4D8;
  --yellow:#F4E4E0;
  --ink:   #1A0810;
  --mid:   #604050;
  --soft:  #A07080;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;}

body{
  background:var(--bg);
  font-family:'Jost',sans-serif;
  font-weight:300;
  font-size:13px;
  cursor:none;
  user-select:none;
}

/* ── CURSOR ── */
#cur{
  position:fixed;pointer-events:none;z-index:9999;
  font-size:16px;line-height:1;
  transform:translate(-50%,-60%);
  transition:transform .1s;
  filter:drop-shadow(0 2px 4px rgba(139,32,64,.3));
}

/* ── SCREENS ── */
.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .5s ease, transform .5s ease;
  overflow:hidden;
}
.screen.hidden{
  opacity:0;pointer-events:none;transform:scale(.97);
}

/* ── SCREEN: TITLE ── */
#s-title{background:var(--bg);}

.stars-bg{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;
}
.star{
  position:absolute;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate;
  font-size:var(--sz,1rem);
  opacity:.6;
}
@keyframes twinkle{from{opacity:.2;transform:scale(.8);}to{opacity:.9;transform:scale(1.1);}}

.title-inner{
  text-align:center;position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:0;
}

.title-hi{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--soft);margin-bottom:20px;
  animation:fadeUp .6s ease .1s both;
}

.title-name{
  font-family:'Jost',sans-serif;
  font-weight:500;font-size:clamp(2.8rem,7vw,5rem);
  line-height:1;letter-spacing:.12em;text-transform:uppercase;
  color:var(--acc);
  animation:fadeUp .7s ease .2s both;
}

.title-role{
  font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:var(--soft);margin-top:10px;margin-bottom:48px;
  animation:fadeUp .7s ease .35s both;
}

/* the door buttons */
.doors{
  display:flex;gap:16px;flex-wrap:wrap;justify-content:center;
  animation:fadeUp .7s ease .5s both;
}

.door{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:none;
  transition:transform .25s;
}
.door:hover{transform:translateY(-6px);}

.door-icon{
  width:80px;height:80px;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;
  position:relative;
  transition:box-shadow .25s;
}
.door:hover .door-icon{
  box-shadow:0 8px 24px rgba(90,58,136,.2);
}

.door-label{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--soft);
}

/* door colours */
.d-about .door-icon{background:var(--lav2);border:1.5px solid var(--lav);}
.d-work  .door-icon{background:var(--pink3);border:1.5px solid var(--pink2);}
.d-learn .door-icon{background:var(--sage2);border:1.5px solid var(--sage);}
.d-now   .door-icon{background:var(--yellow);border:1.5px solid #D8CC80;}
.d-game  .door-icon{background:var(--lav3);border:1.5px dashed var(--acc);} /* game is special */

/* lang in corner */
.lang-corner{
  position:fixed;top:20px;right:24px;
  display:flex;gap:0;z-index:500;
}
.lbtn{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  padding:5px 10px;background:transparent;border:none;
  color:var(--soft);cursor:none;font-family:'DM Mono',monospace;
}
.lbtn.on{color:var(--acc);}
.lbtn:first-child{border-right:1px solid var(--lav);}

/* email corner */
.email-corner{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--soft);
  display:flex;align-items:center;gap:8px;
  animation:fadeUp .7s ease .8s both;
  cursor:none;
  transition:color .2s;
}
.email-corner:hover{color:var(--acc);}
.email-corner svg{opacity:.6;}
a.email-corner{text-decoration:none;}

/* ── SCREEN: PANEL ── */
.panel-screen{
  background:var(--bg);
  padding:0;
}

.panel-wrap{
  width:min(680px,92vw);
  max-height:82vh;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--lav) transparent;
  position:relative;
  background:var(--bg);
}

/* back button */
.back-btn{
  position:fixed;top:20px;left:24px;
  display:flex;align-items:center;gap:8px;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--soft);cursor:none;
  transition:color .2s;
  z-index:500;
}
.back-btn:hover{color:var(--acc);}

/* panel header stripe */
.panel-stripe{
  height:5px;width:100%;
  border-radius:3px 3px 0 0;
  margin-bottom:0;
}
.about-stripe{background:linear-gradient(90deg,var(--lav),var(--acc));}
.work-stripe{background:linear-gradient(90deg,var(--pink),var(--acc));}
.learn-stripe{background:linear-gradient(90deg,var(--sage),var(--acc));}
.now-stripe{background:linear-gradient(90deg,#D8CC80,var(--acc));}

.panel-body{
  padding:40px 44px 44px;
  border:1.5px solid var(--lav2);
  border-top:none;
  background:var(--bg);
}

.panel-title{
  font-family:'Jost',sans-serif;
  font-weight:500;font-size:1.4rem;
  color:var(--acc);line-height:1.1;
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:6px;
}
.panel-title em{font-style:italic;font-weight:300;color:var(--pink);}
.panel-sub{
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--soft);margin-bottom:28px;
}

/* about content */
.about-intro{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:1.08rem;line-height:1.85;color:var(--mid);
  margin-bottom:28px;
}
.about-intro strong{font-style:normal;color:var(--acc);}

.fact-list{list-style:none;border-top:1px solid var(--lav2);}
.fact-li{
  display:grid;grid-template-columns:20px 1fr;gap:10px;
  padding:11px 0;border-bottom:1px solid var(--lav2);
  font-size:12px;
}
.fact-ico{font-size:.85rem;}
.fact-k{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--lav);display:block;margin-bottom:1px;}
.fact-v{color:var(--ink);}

/* work content */
.work-item{
  padding:20px 0;border-bottom:1px solid var(--lav2);
}
.work-item:first-child{border-top:1px solid var(--lav2);}
.work-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:2px;}
.work-role{
  font-family:'Jost',sans-serif;font-weight:500;
  font-size:1rem;color:var(--acc);letter-spacing:.04em;text-transform:uppercase;
}
.work-date{font-size:9px;color:var(--soft);letter-spacing:.5px;}
.work-bullets{list-style:none;margin-top:6px;}
.work-bullets li{
  font-size:11.5px;color:#4A4060;line-height:1.6;
  padding:1px 0 1px 10px;position:relative;
}
.work-bullets li::before{content:'–';position:absolute;left:0;color:var(--lav);}

/* edu item */
.edu-item{padding:16px 0;border-bottom:1px solid var(--lav2);}
.edu-item:first-child{border-top:1px solid var(--lav2);}
.edu-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:1px;}
.edu-q{font-family:'Fraunces',serif;font-weight:700;font-size:.95rem;color:var(--acc);}
.edu-date{font-size:9px;color:var(--soft);}
.edu-where{font-family:'Fraunces',serif;font-style:italic;font-size:.85rem;color:var(--soft);margin-bottom:3px;}
.edu-note{font-size:11px;color:#6A5880;}

/* learn content */
.learn-row{
  display:grid;grid-template-columns:1fr auto;
  gap:12px;align-items:center;
  padding:14px 0;border-bottom:1px solid var(--lav2);
}
.learn-row:first-child{border-top:1px solid var(--lav2);}
.learn-name{font-size:12.5px;color:var(--ink);margin-bottom:2px;}
.learn-detail{font-size:10px;color:var(--soft);}
.learn-prog{height:2px;background:var(--lav2);margin-top:6px;overflow:hidden;}
.learn-fill{height:100%;background:linear-gradient(90deg,var(--lav),var(--acc));width:0%;transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.lbadge{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;border:1px solid;padding:3px 8px;white-space:nowrap;}
.lb-on{border-color:var(--acc);color:var(--acc);}
.lb-done{border-color:var(--lav);color:var(--soft);}

/* skills chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px;}
.chip{
  font-size:9px;letter-spacing:.5px;
  border:1px solid var(--lav2);color:#6A5880;
  padding:4px 10px;background:var(--lav3);
}

/* now content */
.now-row{
  padding:18px 0;border-bottom:1px solid var(--lav2);
}
.now-row:first-child{border-top:1px solid var(--lav2);}
.now-lbl{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--pink);margin-bottom:6px;
}
.now-txt{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:1rem;color:var(--ink);line-height:1.55;
}

/* ── SCREEN: GAME ── */
#s-game{
  background:#C49098;
  flex-direction:column;gap:16px;
}
.game-title-t{
  font-family:'Jost',sans-serif;font-weight:500;
  font-size:1.2rem;color:var(--ink);letter-spacing:.06em;text-transform:uppercase;
}
.game-score-wrap{
  display:flex;align-items:center;gap:16px;
}
.g-score-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink);opacity:.6;}
.g-score{
  font-family:'Jost',sans-serif;font-weight:500;
  font-size:2rem;color:var(--ink);line-height:1;
}
#snakeCanvas{
  border:1.5px solid rgba(26,8,16,.15);
  image-rendering:pixelated;display:block;
}
.game-btns{display:flex;gap:10px;}
.gbtn{
  background:var(--ink);color:#FDF8F8;
  border:none;padding:10px 22px;
  font-family:'Jost',sans-serif;font-weight:400;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  cursor:none;transition:background .2s;
}
.gbtn:hover{background:var(--acc);}
.g-ctrl{font-size:9px;color:var(--ink);opacity:.5;letter-spacing:1px;}
.dpad{display:none;grid-template-areas:". up ." "left . right" ". down .";grid-template-columns:40px 40px 40px;grid-template-rows:40px 40px 40px;gap:4px;}
.dpad-btn{background:rgba(224,216,244,.15);border:1px solid rgba(224,216,244,.2);color:var(--lav2);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px;-webkit-tap-highlight-color:transparent;user-select:none;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@keyframes popIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}

.panel-wrap{animation:popIn .35s ease both;}

/* hover wiggle on door icons */
@keyframes wiggle{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
.door:hover .door-icon{animation:wiggle .4s ease;}

@media(max-width:600px){
  .doors{gap:12px;}
  .door-icon{width:64px;height:64px;font-size:1.6rem;}
  .panel-body{padding:28px 24px 32px;}
  #snakeCanvas{display:none;}
  .dpad{display:grid;}
}
</style>
</head>

  <div class="game-title-t" id="game-title-t"></div>
  <div class="game-score-wrap">

  <div class="game-btns">

  </div>
  <div class="g-ctrl" id="g-ctrl"></div>
  <div class="dpad" id="dpad">
    <div class="dpad-btn" style="grid-area:up" ontouchstart="dpadDir('UP')">↑</div>
    <div class="dpad-btn" style="grid-area:left" ontouchstart="dpadDir('LEFT')">←</div>

</div>

/* ── STARS ── */
function makeStars(){
  const c=document.getElementById('stars');
  const emojis=['✦','✧','★','✸','·','˙'];
  for(let i=0;i<28;i++){
    const s=document.createElement('span');
    s.className='star';
    s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.setProperty('--d',(2+Math.random()*4)+'s');
    s.style.setProperty('--sz',(.5+Math.random()*.8)+'rem');
    s.style.animationDelay=Math.random()*4+'s';
    s.style.color=['#C4B4E0','#E88AB0','#A8C0A0','#D4C860','#D4C0EC'][Math.floor(Math.random()*5)];
    c.appendChild(s);
  }
}

/* ── SNAKE ── */
const canvas=document.getElementById('snakeCanvas');
const ctx=canvas?canvas.getContext('2d'):null;
const CELL=14,COLS=20,ROWS=20;
if(canvas){canvas.width=CELL*COLS;canvas.height=CELL*ROWS;}
const SC={bg:'#C49098',grid:'rgba(255,240,244,.12)',head:'#FDF0F2',body:['#EDD4DC','#8B2040','#C96080'],food:'#FDF0F4'};
let snake,dir,nextDir,food,score=0,gameRunning=false,gameOver=false,gameLoop;
function initGame(){snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;gameOver=false;placeFood();document.getElementById('scoreDisplay').textContent='0';}
function placeFood(){let p;do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}while(snake.some(s=>s.x===p.x&&s.y===p.y));food=p;}
function drawGame(){if(!ctx)return;ctx.fillStyle=SC.bg;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle=SC.grid;ctx.lineWidth=.5;for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}ctx.fillStyle=SC.food;ctx.font=`bold ${CELL+2}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✦',food.x*CELL+CELL/2,food.y*CELL+CELL/2+1);snake.forEach((seg,i)=>{ctx.fillStyle=i===0?SC.head:SC.body[i%SC.body.length];const pad=i===0?1:2,x=seg.x*CELL+pad,y=seg.y*CELL+pad,w=CELL-pad*2,h=CELL-pad*2,r=3;ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();});}
function step(){dir=nextDir;const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){endGame();return;}snake.unshift(head);if(head.x===food.x&&head.y===food.y){score++;document.getElementById('scoreDisplay').textContent=score;placeFood();}else snake.pop();drawGame();}
function startGame(){if(gameLoop)clearInterval(gameLoop);initGame();gameRunning=true;gameOver=false;drawGame();gameLoop=setInterval(step,130);document.getElementById('startBtn').textContent=t('g_restart');}
function endGame(){clearInterval(gameLoop);gameRunning=false;gameOver=true;if(ctx){ctx.fillStyle='rgba(30,16,48,.85)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#E0D4F4';ctx.font=`bold 15px 'DM Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t('g_over'),canvas.width/2,canvas.height/2-10);ctx.font=`11px 'DM Mono',monospace`;ctx.fillStyle='rgba(196,180,224,.6)';ctx.fillText(`${t('g_score')}: ${score}`,canvas.width/2,canvas.height/2+12);}document.getElementById('startBtn').textContent=t('g_restart');}
function drawIdle(){if(!ctx)return;ctx.fillStyle=SC.bg;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle=SC.food;ctx.font='bold 22px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✦',canvas.width/2,canvas.height/2);}
document.addEventListener('keydown',e=>{if(!gameRunning)return;const m={'ArrowUp':{x:0,y:-1},'ArrowDown':{x:0,y:1},'ArrowLeft':{x:-1,y:0},'ArrowRight':{x:1,y:0},'w':{x:0,y:-1},'s':{x:0,y:1},'a':{x:-1,y:0},'d':{x:1,y:0},'W':{x:0,y:-1},'S':{x:0,y:1},'A':{x:-1,y:0},'D':{x:1,y:0}};const nd=m[e.key];if(nd&&!(nd.x===-dir.x&&nd.y===-dir.y))nextDir=nd;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
function dpadDir(d){if(!gameRunning)return;const m={UP:{x:0,y:-1},DOWN:{x:0,y:1},LEFT:{x:-1,y:0},RIGHT:{x:1,y:0}};const nd=m[d];if(nd&&!(nd.x===-dir.x&&nd.y===-dir.y))nextDir=nd;}
